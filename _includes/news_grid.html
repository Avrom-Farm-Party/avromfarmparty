<div class="grid grid-cols-1 sm:grid-cols-3 gap-4 items-stretch">
    {% for post in site.posts limit:include.limit %}
    <article class="bg-yellow-500/20 p-4 space-y-2">
        <a href="{{ post.url }}" class="font-bold link">{{ post.title }}</a>
        <div class="text-sm">{{ post.excerpt | truncate: 150 }}</div>
    </article>
    {% endfor %}
</div>
